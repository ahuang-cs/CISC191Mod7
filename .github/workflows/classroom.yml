name: GitHub Classroom Autograding

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build-and-test:
    name: Build and test Maven modules
    runs-on: ubuntu-latest

    steps:
      - name: Check out student repository
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Build all modules
        run: mvn -B clean install

      - name: Test gRPC server module
        run: mvn -B -pl game-server test

      - name: Test JavaFX client model module
        run: mvn -B -pl game-client test
